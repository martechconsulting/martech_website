name: Build Blog

on:
  push:
    branches: [main]
    paths:
      - '_posts/**'
      - 'build.js'
      - 'blog.html'

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build blog posts
        run: node build.js

      - name: Commit generated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add blog/ blog.html sitemap.xml
          git diff --staged --quiet || git commit -m "Build: generate blog posts from _posts/"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
